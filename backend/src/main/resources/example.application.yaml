spring:
  application:
    name: demo
  datasource:
    url: jdbc:postgresql://localhost:5432/cart-shop
    username: {USERNAME}  
    password: {PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
